[[rule]]
toolName = "replace"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 100
commandPrefix = [ "black", "grep", "mkdir", "mypy", "pytest" ]

[[rule]]
toolName = "run_shell_command"
decision = "allow"
priority = 950
commandPrefix = [
  "basedpyright",
  "cargo",
  "cat",
  "env",
  "go test",
  "go tool cover",
  "goimports",
  "golangci-lint",
  "grep",
  "ls",
  "pre-commit",
  "pytest",
  "ruff",
  "touch",
]

[[rule]]
toolName = "write_file"
decision = "allow"
priority = 100
